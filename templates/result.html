<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>{{ student_id }}님의 학점 정보</title>
    <style>
        body { font-family: Arial, sans-serif; background: #eef2f3; padding: 40px; }
        .container { background: #fff; padding: 30px; border-radius: 8px; max-width: 600px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
        th { background-color: #f9f9f9; }
    </style>
</head>
<body>
<div class="container">
    <h2>{{ student_id }}님의 졸업 학점 현황</h2>
    <table>
        <tr>
            <th>학점 항목</th>
        </tr>
        {% for item in credits %}
        <tr>
            <td>{{ item }}</td>
        </tr>
        {% endfor %}
    </table>
</div>
</body>
</html>
